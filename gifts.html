<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts | Royal Fashion NYC</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/shop.css">
</head>

<body>
    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="Images/logo.png" class="site-logo" alt="Logo"></a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="apparel.html">Apparel</a></li>
            <li><a href="cart.html">Bag (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <div class="shop-main-wrapper">
        <aside class="filter-sidebar">
            <h2>Gift Filters</h2>

            <details open>
                <summary>Price Range</summary>
                <div class="price-input-container">
                    <div class="price-label">$<span id="range1">0</span></div>
                    <div class="price-label">$<span id="range2">200</span></div>
                </div>
                <div class="price-slider-wrapper">
                    <div class="slider-track" id="track"></div>
                    <input type="range" min="0" max="200" value="0" id="slider-1" oninput="slideOne()">
                    <input type="range" min="0" max="200" value="200" id="slider-2" oninput="slideTwo()">
                </div>
            </details>

            <details open>
                <summary>Color</summary>
                <div class="color-filter-grid">
                    <div class="color-option" style="background: white;" onclick="toggleColorFilter('white', this)"></div>
                    <div class="color-option" style="background: black;" onclick="toggleColorFilter('black', this)"></div>
                    <div class="color-option" style="background: grey;" onclick="toggleColorFilter('grey', this)"></div>
                    <div class="color-option" style="background: navy;" onclick="toggleColorFilter('navy', this)"></div>
                    <div class="color-option" style="background: yellow;" onclick="toggleColorFilter('yellow', this)"></div>
                    <div class="color-option" style="background: orange;" onclick="toggleColorFilter('orange', this)"></div>
                </div>
            </details>
        </aside>

        <main class="product-area">
            <div class="category-nav">
                <span class="cat-tab active" onclick="setMainCategory('gifts', this)">All Gifts</span>
                <span class="cat-tab" onclick="setMainCategory('Keychains', this)">Keychains</span>
                <span class="cat-tab" onclick="setMainCategory('License Plates', this)">License Plates</span>
                <span class="cat-tab" onclick="setMainCategory('Mugs', this)">Mugs</span>
                <span class="cat-tab" onclick="setMainCategory('Snowglobes', this)">Snowglobes</span>
            </div>

            <div class="shipping-claim-container" style="text-align: center; margin-bottom: 25px;">
                <button type="button" id="claim-shipping-toggle" 
                    style="background: none; border: none; color: #28a745; font-weight: 800; cursor: pointer; text-decoration: underline; font-size: 0.9rem;">
                    Claim free shipping!
                </button>
                <div id="shipping-details" style="display: none; margin-top: 8px; font-size: 0.75rem; color: #666; background: #f9f9f9; padding: 8px; border-radius: 4px;">
                    Spend <strong>$40</strong> for Free US Shipping <br> 
                    or <strong>$100</strong> for Free International Shipping!
                </div>
            </div>

            <div id="product-container"></div>
        </main>
    </div>

    <footer>
        <p>175 Mulberry St, New York, NY 10013</p>
    </footer>

    <script>window.activeMainCategory = "gifts";</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/shop.js"></script>

</body>
</html>
