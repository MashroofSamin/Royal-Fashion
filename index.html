        <script>
            const track = document.getElementById('carouselTrack');
            let isDown = false;
            let startX;
            let scrollLeft = 0;
            let autoScrollPos = 0;
            let isPaused = false;

            // --- AUTO SCROLL LOGIC ---
            function step() {
                if (!isDown && !isPaused) {
                    autoScrollPos -= 0.5; // Adjust this number to change auto-speed
                    // Reset loop if it goes too far
                    if (Math.abs(autoScrollPos) >= track.scrollWidth / 2) {
                        autoScrollPos = 0;
                    }
                    track.style.transform = `translateX(${autoScrollPos}px)`;
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);

            // --- DRAG LOGIC ---
            track.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - track.offsetLeft;
                scrollLeft = autoScrollPos;
            });

            track.addEventListener('mouseleave', () => { isDown = false; });
            track.addEventListener('mouseup', () => { isDown = false; });

            track.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - track.offsetLeft;
                const walk = (x - startX); 
                autoScrollPos = scrollLeft + walk;
                track.style.transform = `translateX(${autoScrollPos}px)`;
            });

            // Pause auto-scroll on hover
            track.addEventListener('mouseenter', () => { isPaused = true; });
            track.addEventListener('mouseleave', () => { isPaused = false; });
        </script>
