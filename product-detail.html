<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Product View | Royal Fashion NYC</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/product.css">

    <style>
        /* Color swatches */
        .color-swatch-group {
            margin-bottom: 20px;
        }

        .color-swatch-group label {
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .color-swatch-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.15);
            border-color: #aaa;
        }

        .color-swatch.selected {
            border: 2px solid var(--brand-green);
            box-shadow: 0 0 0 2px var(--brand-green);
            transform: scale(1.1);
        }

        .color-swatch[style*="background-color: #ffffff"],
        .color-swatch[style*="background-color: rgb(255, 255, 255)"] {
            border-color: #ccc;
        }

        #selected-color-label {
            font-size: 0.85rem;
            color: #555;
            margin-left: 5px;
            text-transform: capitalize;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo-container">
            <a href="index.html">
                <img src="Images/logo.png" class="site-logo" alt="Royal Fashion Logo">
            </a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="apparel.html">Apparel</a></li>
            <li><a href="gifts.html">Gifts</a></li>
            <li><a href="cart.html">Bag (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <main id="product-content">
        <div class="product-detail-container">

            <div class="product-image-gallery">
                <div class="img-zoom-container">
                    <img id="mainProductImg" src="" alt="Product Image">
                    <div id="zoomResult" class="img-zoom-result"></div>
                </div>
            </div>

            <div class="product-info-panel">
                <div class="breadcrumb">Shop / Apparel</div>
                <h1 class="product-title">Loading Product...</h1>
                <div class="product-price">--</div>

                <!-- COLOR SWATCHES -->
                <div id="color-section" class="color-swatch-group" style="display:none;">
                    <label>Color: <span id="selected-color-label"></span></label>
                    <div id="color-grid" class="color-swatch-row"></div>
                </div>

                <!-- SIZE SELECTION -->
                <div class="selection-group">
                    <span class="size-label">Select Size</span>
                    
                    <div id="infant-section" style="display:none;">
                        <p class="group-title">Infants & Toddlers</p>
                        <div id="infant-grid" class="size-grid"></div>
                    </div>

                    <div id="kids-section" style="display:none;">
                        <p class="group-title">Youth / Kids</p>
                        <div id="kids-grid" class="size-grid"></div>
                    </div>

                    <div id="women-section" style="display:none;">
                        <p class="group-title">Women's Sizing</p>
                        <div id="women-grid" class="size-grid"></div>
                    </div>

                    <div id="adult-section" style="display:none;">
                        <p class="group-title">Adult (Unisex)</p>
                        <div id="adult-grid" class="size-grid"></div>
                    </div>
                </div>

                <div class="detail-description">
                    <p id="productDescription">...</p>
                </div>

                <div class="purchase-actions">
                    <button id="initial-add-btn" class="buy-button">Add to Bag</button>
                    <div id="quantity-controls" class="quantity-toggle" style="display: none;">
                        <button id="minus-btn">−</button>
                        <span id="current-qty">1</span>
                        <button id="plus-btn">+</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>175 Mulberry St, New York, NY 10013</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/zoom.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
